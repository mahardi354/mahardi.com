<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<div id="mk-root"></div>
<style>
  #mk-root {
    --bg: #0f1216;
    --panel: #171b21;
    --panel-2: #1e232b;
    --border: #2a3038;
    --text: #e8eaed;
    --text-dim: #9aa4b2;
    --gold: #e0a94a;
    --teal: #4ba894;
    --danger: #d9695f;
    --radius: 10px;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 28px 20px 60px;
    border-radius: 14px;
    max-width: 1040px;
    margin: 0 auto;
    box-sizing: border-box;
  }
  #mk-root * { box-sizing: border-box; }
  .mk-header { margin-bottom: 20px; }
  .mk-eyebrow { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--gold); font-weight: 700; margin-bottom: 6px; }
  .mk-title { font-size: 24px; font-weight: 700; margin: 0 0 4px; }
  .mk-sub { font-size: 13px; color: var(--text-dim); margin: 0; }

  .mk-acuan-row { display:flex; align-items:center; gap:10px; margin-bottom: 18px; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; flex-wrap: wrap; }
  .mk-acuan-row label { font-size: 12px; color: var(--text-dim); }

  .mk-section { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 18px; }
  .mk-section-title { font-size: 14px; font-weight: 700; margin: 0 0 4px; display:flex; align-items:center; gap:8px; }
  .mk-section-desc { font-size: 12px; color: var(--text-dim); margin: 0 0 14px; }
  .mk-subtitle { font-size: 12px; font-weight: 700; margin-bottom: 10px; }

  .mk-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  .mk-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 12px; }
  .mk-field label { display:block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing:.04em; margin-bottom: 5px; }
  .mk-input, .mk-select {
    width: 100%; background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 7px; padding: 9px 11px; font-size: 13px; outline: none; font-family: inherit;
  }
  .mk-input:focus, .mk-select:focus { border-color: var(--gold); }
  .mk-inline-pair { display: flex; gap: 6px; align-items: center; }
  .mk-inline-pair .mk-input { flex: 1; }
  .mk-inline-pair span { font-size: 11px; color: var(--text-dim); white-space: nowrap; }

  .mk-btn { background: var(--gold); color: #1a1305; border: none; border-radius: 7px; padding: 10px 18px; font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity .15s; }
  .mk-btn:hover { opacity: .85; }
  .mk-btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); padding: 8px 14px; font-size: 12px; font-weight: 600; border-radius: 7px; cursor: pointer; }
  .mk-btn-ghost:hover { color: var(--text); border-color: var(--text-dim); }
  .mk-btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 5px 10px; font-size: 12px; border-radius: 7px; cursor: pointer; }

  .mk-preview { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-top: 16px; }
  .mk-preview-card { background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .mk-preview-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .05em; }
  .mk-preview-value { font-size: 20px; font-weight: 700; color: var(--gold); margin-top: 6px; }
  .mk-preview-value.teal { color: var(--teal); }

  .mk-rincian { display: none; margin-top: 14px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
  .mk-rincian.open { display: block; }
  .mk-rincian table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .mk-rincian td { padding: 6px 4px; border-bottom: 1px solid var(--border); }
  .mk-rincian td:first-child { color: var(--text-dim); }
  .mk-rincian td:last-child { text-align: right; font-weight: 600; }
  .mk-rincian tr:last-child td { border-bottom: none; }

  .mk-cards { display: flex; flex-direction: column; gap: 12px; }
  .mk-card { background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .mk-card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 10px; flex-wrap: wrap; }
  .mk-card-name { font-size: 15px; font-weight: 700; }
  .mk-card-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .mk-metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; }
  .mk-metric { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
  .mk-metric-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .04em; }
  .mk-metric-value { font-size: 14px; font-weight: 700; margin-top: 3px; color: var(--gold); }
  .mk-metric-value.teal { color: var(--teal); }
  .mk-metric-value.danger { color: var(--danger); }
  .mk-empty { color: var(--text-dim); font-size: 13px; padding: 16px 0; text-align: center; }

  .mk-note { font-size: 11px; color: var(--text-dim); margin-top: 16px; line-height: 1.6; border-top: 1px solid var(--border); padding-top: 12px; }
  .mk-toast {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    background: var(--teal); color: #08211b; padding: 9px 18px; border-radius: 999px;
    font-size: 13px; font-weight: 600; opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s;
    z-index: 999;
  }
  .mk-toast.show { opacity: 1; transform: translateX(-50%) translateY(-6px); }
  .mk-loading { color: var(--text-dim); font-size: 13px; padding: 30px; text-align: center; }
</style>

<script>
(function() {
  const root = document.getElementById('mk-root');
  root.innerHTML = '<div class="mk-loading">Memuat data...</div>';

  let pegawaiList = [];
  let tanggalAcuan = new Date().toISOString().slice(0, 10);
  let toastTimer = null;
  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

  async function loadData() {
    try {
      const r = await window.storage.get('pegawai_masa_kerja_v2', false);
      pegawaiList = r ? JSON.parse(r.value) : [];
    } catch (e) { pegawaiList = []; }
    render();
  }
  async function saveData() {
    try { await window.storage.set('pegawai_masa_kerja_v2', JSON.stringify(pegawaiList), false); }
    catch (e) { console.error('gagal simpan data', e); }
  }
  function showToast(msg) {
    let t = root.querySelector('.mk-toast');
    if (!t) { t = document.createElement('div'); t.className = 'mk-toast'; root.appendChild(t); }
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1900);
  }

  // ---- date helpers ----
  function parseDate(s) {
    const [y, m, d] = s.split('-').map(Number);
    return new Date(y, m - 1, d);
  }
  function fmtDate(d) {
    if (!d) return '-';
    const names = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
    return d.getDate() + ' ' + names[d.getMonth()] + ' ' + d.getFullYear();
  }
  // Y/YM style, mirrors Excel DATEDIF(start,end,"Y") and "YM"
  function dateDiffYM(start, end) {
    let years = end.getFullYear() - start.getFullYear();
    let months = end.getMonth() - start.getMonth();
    let days = end.getDate() - start.getDate();
    if (days < 0) months -= 1;
    if (months < 0) { years -= 1; months += 12; }
    return { years, months };
  }
  // Full Y/M/D difference (used for usia & sisa masa kerja)
  function diffYMD(d1, d2) {
    if (d2 < d1) return null;
    let years = d2.getFullYear() - d1.getFullYear();
    let months = d2.getMonth() - d1.getMonth();
    let days = d2.getDate() - d1.getDate();
    if (days < 0) {
      months -= 1;
      const prevMonthLastDay = new Date(d2.getFullYear(), d2.getMonth(), 0).getDate();
      days += prevMonthLastDay;
    }
    if (months < 0) { years -= 1; months += 12; }
    return { years, months, days };
  }
  function addYears(d, n) { return new Date(d.getFullYear() + n, d.getMonth(), d.getDate()); }
  function lastDayOfMonth(d) { return new Date(d.getFullYear(), d.getMonth() + 1, 0); }
  function ymdLabel(o) {
    if (!o) return '-';
    const parts = [];
    if (o.years) parts.push(o.years + ' thn');
    if (o.months) parts.push(o.months + ' bln');
    if (o.days || parts.length === 0) parts.push(o.days + ' hr');
    return parts.join(' ');
  }

  // Masa kerja golongan / keseluruhan — replicates the uploaded Excel formulas exactly
  function hitungMasaKerja(skTahun, skBulan, tmt, ref) {
    const { years, months } = dateDiffYM(tmt, ref);
    const totalBulan = skBulan + months;
    const tahunHasil = skTahun + years + Math.floor(totalBulan / 12);
    const bulanHasil = totalBulan % 12;
    return { tahunHasil, bulanHasil, years, months };
  }

  function computeForPegawai(p, refDateStr) {
    const ref = parseDate(refDateStr);
    const tmtTerakhir = parseDate(p.tmtTerakhir);
    const tmtCpns = parseDate(p.tmtCpns);
    const skTerakhirThn = parseInt(p.skTerakhirThn, 10) || 0;
    const skTerakhirBln = parseInt(p.skTerakhirBln, 10) || 0;
    const skCpnsThn = parseInt(p.skCpnsThn, 10) || 0;
    const skCpnsBln = parseInt(p.skCpnsBln, 10) || 0;

    const golongan = hitungMasaKerja(skTerakhirThn, skTerakhirBln, tmtTerakhir, ref);
    const keseluruhan = hitungMasaKerja(skCpnsThn, skCpnsBln, tmtCpns, ref);

    // Reference date for KGB / kenaikan pangkat estimation: TMT SK Terakhir mundur sejumlah masa kerja pada SK Terakhir
    const tmtGolongan = new Date(tmtTerakhir.getFullYear() - skTerakhirThn, tmtTerakhir.getMonth() - skTerakhirBln, tmtTerakhir.getDate());
    let nextKGB = addYears(tmtGolongan, 2);
    while (nextKGB <= ref) nextKGB = addYears(nextKGB, 2);
    let nextKP = addYears(tmtGolongan, 4);
    while (nextKP <= ref) nextKP = addYears(nextKP, 4);

    let usia = null, pensiunDate = null, sisaMasaKerja = null;
    if (p.tglLahir) {
      const tglLahir = parseDate(p.tglLahir);
      usia = diffYMD(tglLahir, ref);
      const bup = parseInt(p.bup, 10) || 58;
      const ultahBUP = new Date(tglLahir.getFullYear() + bup, tglLahir.getMonth(), tglLahir.getDate());
      pensiunDate = lastDayOfMonth(ultahBUP);
      sisaMasaKerja = diffYMD(ref, pensiunDate);
    }

    return { golongan, keseluruhan, nextKGB, nextKP, usia, pensiunDate, sisaMasaKerja };
  }

  async function addPegawai(data) {
    if (!data.tmtTerakhir || !data.tmtCpns) {
      showToast('TMT SK Terakhir dan TMT SK CPNS wajib diisi');
      return;
    }
    pegawaiList.push({ id: uid(), ...data });
    await saveData();
    render();
    showToast('Data "' + (data.nama || 'pegawai') + '" ditambahkan');
  }
  async function deletePegawai(id) {
    pegawaiList = pegawaiList.filter(p => p.id !== id);
    await saveData();
    render();
    showToast('Data dihapus');
  }

  function exportToExcel() {
    if (typeof XLSX === 'undefined') {
      showToast('Modul export belum siap, coba lagi sebentar');
      return;
    }
    if (pegawaiList.length === 0) {
      showToast('Belum ada data untuk di-export');
      return;
    }
    const rows = pegawaiList.map(p => {
      const calc = computeForPegawai(p, tanggalAcuan);
      return {
        'Nama Pegawai': p.nama || '',
        'Tanggal Lahir': p.tglLahir || '',
        'Batas Usia Pensiun': p.bup ? p.bup + ' tahun' : '',
        'TMT SK Terakhir': p.tmtTerakhir || '',
        'Masa Kerja pada SK Terakhir': (p.skTerakhirThn || 0) + ' thn ' + (p.skTerakhirBln || 0) + ' bln',
        'TMT SK CPNS': p.tmtCpns || '',
        'Masa Kerja pada SK CPNS': (p.skCpnsThn || 0) + ' thn ' + (p.skCpnsBln || 0) + ' bln',
        'Masa Kerja Golongan': calc.golongan.tahunHasil + ' thn ' + calc.golongan.bulanHasil + ' bln',
        'Masa Kerja Keseluruhan': calc.keseluruhan.tahunHasil + ' thn ' + calc.keseluruhan.bulanHasil + ' bln',
        'KGB Berikutnya (estimasi)': fmtDate(calc.nextKGB),
        'Kenaikan Pangkat Berikutnya (estimasi)': fmtDate(calc.nextKP),
        'Usia Saat Ini': calc.usia ? ymdLabel(calc.usia) : '',
        'Perkiraan Tanggal Pensiun': calc.pensiunDate ? fmtDate(calc.pensiunDate) : '',
        'Sisa Masa Kerja': calc.sisaMasaKerja ? ymdLabel(calc.sisaMasaKerja) : (p.tglLahir ? 'Sudah/lewat BUP' : ''),
      };
    });

    const ws = XLSX.utils.json_to_sheet(rows);
    const colWidths = Object.keys(rows[0]).map(key => {
      const maxLen = Math.max(key.length, ...rows.map(r => String(r[key] || '').length));
      return { wch: Math.min(Math.max(maxLen + 2, 10), 40) };
    });
    ws['!cols'] = colWidths;

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Masa Kerja PNS');

    const infoWs = XLSX.utils.aoa_to_sheet([
      ['Tanggal Acuan Perhitungan', tanggalAcuan],
      ['Diekspor pada', new Date().toISOString().slice(0, 10)],
      ['Jumlah Pegawai', pegawaiList.length],
    ]);
    XLSX.utils.book_append_sheet(wb, infoWs, 'Info');

    const fname = 'masa-kerja-pns-' + tanggalAcuan + '.xlsx';
    XLSX.writeFile(wb, fname);
    showToast('Data berhasil di-export');
  }

  function render() {
    root.innerHTML = '';
    const wrap = document.createElement('div');

    wrap.innerHTML = `
      <div class="mk-header">
        <div class="mk-eyebrow">Kepegawaian</div>
        <h2 class="mk-title">Aplikasi Perhitungan Masa Kerja PNS</h2>
        <p class="mk-sub">Masa Kerja Golongan &amp; Keseluruhan (sesuai rumus resmi), plus estimasi KGB, kenaikan pangkat, dan pensiun.</p>
      </div>
    `;

    // Tanggal acuan (global)
    const acuanRow = document.createElement('div');
    acuanRow.className = 'mk-acuan-row';
    const acuanLabel = document.createElement('label');
    acuanLabel.textContent = 'Waktu Sekarang / Tanggal Acuan:';
    const acuanInput = document.createElement('input');
    acuanInput.type = 'date';
    acuanInput.className = 'mk-input';
    acuanInput.style.maxWidth = '180px';
    acuanInput.value = tanggalAcuan;
    acuanInput.onchange = () => { tanggalAcuan = acuanInput.value; render(); };
    const acuanHint = document.createElement('span');
    acuanHint.style.cssText = 'font-size:11px;color:var(--text-dim)';
    acuanHint.textContent = 'Berlaku untuk semua perhitungan di bawah. Default hari ini, bisa diubah untuk proyeksi.';
    acuanRow.appendChild(acuanLabel);
    acuanRow.appendChild(acuanInput);
    acuanRow.appendChild(acuanHint);
    wrap.appendChild(acuanRow);

    // ===== Form input =====
    const sForm = document.createElement('div');
    sForm.className = 'mk-section';
    sForm.innerHTML = `
      <div class="mk-section-title">📝 Input Data Pegawai</div>
      <div class="mk-section-desc">Isi data sesuai SK. Tanggal lahir &amp; Batas Usia Pensiun opsional — isi jika ingin melihat perkiraan pensiun.</div>
    `;

    function field(labelText, inputEl) {
      const f = document.createElement('div');
      f.className = 'mk-field';
      const l = document.createElement('label');
      l.textContent = labelText;
      f.appendChild(l);
      f.appendChild(inputEl);
      return f;
    }

    const inNama = document.createElement('input');
    inNama.className = 'mk-input';
    inNama.placeholder = 'Nama pegawai';

    const inTglLahir = document.createElement('input');
    inTglLahir.type = 'date';
    inTglLahir.className = 'mk-input';

    const inBup = document.createElement('select');
    inBup.className = 'mk-select';
    inBup.innerHTML = `
      <option value="58">58 tahun (Administrasi/Pelaksana)</option>
      <option value="60">60 tahun (Pimpinan Tinggi/Fungsional Ahli)</option>
      <option value="65">65 tahun (Fungsional Ahli Utama)</option>
    `;

    const grid0 = document.createElement('div');
    grid0.className = 'mk-grid';
    grid0.appendChild(field('Nama Pegawai', inNama));
    grid0.appendChild(field('Tanggal Lahir (opsional)', inTglLahir));
    grid0.appendChild(field('Batas Usia Pensiun', inBup));
    sForm.appendChild(grid0);
    sForm.appendChild(Object.assign(document.createElement('hr'), { className: 'mk-divider' }));

    const golTitle = document.createElement('div');
    golTitle.className = 'mk-subtitle';
    golTitle.style.color = 'var(--gold)';
    golTitle.textContent = 'Untuk Masa Kerja Golongan (berdasarkan SK Terakhir)';
    sForm.appendChild(golTitle);

    const inTmtTerakhir = document.createElement('input');
    inTmtTerakhir.type = 'date';
    inTmtTerakhir.className = 'mk-input';

    const skTerakhirPair = document.createElement('div');
    skTerakhirPair.className = 'mk-inline-pair';
    const inSkTerakhirThn = document.createElement('input');
    inSkTerakhirThn.type = 'number'; inSkTerakhirThn.min = '0'; inSkTerakhirThn.className = 'mk-input'; inSkTerakhirThn.placeholder = '0';
    const inSkTerakhirBln = document.createElement('input');
    inSkTerakhirBln.type = 'number'; inSkTerakhirBln.min = '0'; inSkTerakhirBln.max = '11'; inSkTerakhirBln.className = 'mk-input'; inSkTerakhirBln.placeholder = '0';
    skTerakhirPair.appendChild(inSkTerakhirThn);
    skTerakhirPair.appendChild(Object.assign(document.createElement('span'), { textContent: 'thn' }));
    skTerakhirPair.appendChild(inSkTerakhirBln);
    skTerakhirPair.appendChild(Object.assign(document.createElement('span'), { textContent: 'bln' }));

    const grid1 = document.createElement('div');
    grid1.className = 'mk-grid';
    grid1.appendChild(field('TMT SK Terakhir', inTmtTerakhir));
    grid1.appendChild(field('Masa Kerja pada SK Terakhir', skTerakhirPair));
    sForm.appendChild(grid1);
    sForm.appendChild(Object.assign(document.createElement('hr'), { className: 'mk-divider' }));

    const kesTitle = document.createElement('div');
    kesTitle.className = 'mk-subtitle';
    kesTitle.style.color = 'var(--teal)';
    kesTitle.textContent = 'Untuk Masa Kerja Keseluruhan (berdasarkan SK CPNS)';
    sForm.appendChild(kesTitle);

    const inTmtCpns = document.createElement('input');
    inTmtCpns.type = 'date';
    inTmtCpns.className = 'mk-input';

    const skCpnsPair = document.createElement('div');
    skCpnsPair.className = 'mk-inline-pair';
    const inSkCpnsThn = document.createElement('input');
    inSkCpnsThn.type = 'number'; inSkCpnsThn.min = '0'; inSkCpnsThn.className = 'mk-input'; inSkCpnsThn.placeholder = '0';
    const inSkCpnsBln = document.createElement('input');
    inSkCpnsBln.type = 'number'; inSkCpnsBln.min = '0'; inSkCpnsBln.max = '11'; inSkCpnsBln.className = 'mk-input'; inSkCpnsBln.placeholder = '0';
    skCpnsPair.appendChild(inSkCpnsThn);
    skCpnsPair.appendChild(Object.assign(document.createElement('span'), { textContent: 'thn' }));
    skCpnsPair.appendChild(inSkCpnsBln);
    skCpnsPair.appendChild(Object.assign(document.createElement('span'), { textContent: 'bln' }));

    const grid2 = document.createElement('div');
    grid2.className = 'mk-grid';
    grid2.appendChild(field('TMT SK CPNS', inTmtCpns));
    grid2.appendChild(field('Masa Kerja pada SK CPNS', skCpnsPair));
    sForm.appendChild(grid2);

    // Live preview
    const previewBox = document.createElement('div');
    previewBox.className = 'mk-preview';
    sForm.appendChild(previewBox);

    const toggleRow = document.createElement('div');
    toggleRow.style.marginTop = '10px';
    const toggleBtn = document.createElement('button');
    toggleBtn.type = 'button';
    toggleBtn.className = 'mk-btn-ghost';
    toggleBtn.textContent = 'Lihat rincian perhitungan';
    toggleRow.appendChild(toggleBtn);
    sForm.appendChild(toggleRow);

    const rincianBox = document.createElement('div');
    rincianBox.className = 'mk-rincian';
    const rincianTable = document.createElement('table');
    rincianBox.appendChild(rincianTable);
    sForm.appendChild(rincianBox);

    let rincianOpen = false;
    toggleBtn.onclick = () => {
      rincianOpen = !rincianOpen;
      rincianBox.classList.toggle('open', rincianOpen);
      toggleBtn.textContent = rincianOpen ? 'Sembunyikan rincian perhitungan' : 'Lihat rincian perhitungan';
    };

    function currentFormData() {
      return {
        nama: inNama.value,
        tglLahir: inTglLahir.value,
        bup: inBup.value,
        tmtTerakhir: inTmtTerakhir.value,
        skTerakhirThn: inSkTerakhirThn.value || 0,
        skTerakhirBln: inSkTerakhirBln.value || 0,
        tmtCpns: inTmtCpns.value,
        skCpnsThn: inSkCpnsThn.value || 0,
        skCpnsBln: inSkCpnsBln.value || 0
      };
    }

    function updatePreview() {
      const d = currentFormData();
      previewBox.innerHTML = '';
      rincianTable.innerHTML = '';
      if (!d.tmtTerakhir || !d.tmtCpns) {
        previewBox.innerHTML = '<div class="mk-empty" style="grid-column:1/-1">Isi TMT SK Terakhir dan TMT SK CPNS untuk melihat hasil.</div>';
        return;
      }
      const calc = computeForPegawai(d, tanggalAcuan);
      previewBox.innerHTML = `
        <div class="mk-preview-card">
          <div class="mk-preview-label">Masa Kerja Golongan</div>
          <div class="mk-preview-value">${calc.golongan.tahunHasil} tahun ${calc.golongan.bulanHasil} bulan</div>
        </div>
        <div class="mk-preview-card">
          <div class="mk-preview-label">Masa Kerja Keseluruhan</div>
          <div class="mk-preview-value teal">${calc.keseluruhan.tahunHasil} tahun ${calc.keseluruhan.bulanHasil} bulan</div>
        </div>
      `;
      const rows = [
        ['Selisih TMT SK Terakhir → Tanggal Acuan', calc.golongan.years + ' tahun ' + calc.golongan.months + ' bulan'],
        ['Masa Kerja pada SK Terakhir', (d.skTerakhirThn||0) + ' tahun ' + (d.skTerakhirBln||0) + ' bulan'],
        ['Selisih TMT SK CPNS → Tanggal Acuan', calc.keseluruhan.years + ' tahun ' + calc.keseluruhan.months + ' bulan'],
        ['Masa Kerja pada SK CPNS', (d.skCpnsThn||0) + ' tahun ' + (d.skCpnsBln||0) + ' bulan'],
      ];
      rows.forEach(([label, value]) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${label}</td><td>${value}</td>`;
        rincianTable.appendChild(tr);
      });
    }
    [inTmtTerakhir, inSkTerakhirThn, inSkTerakhirBln, inTmtCpns, inSkCpnsThn, inSkCpnsBln].forEach(el => {
      el.addEventListener('input', updatePreview);
      el.addEventListener('change', updatePreview);
    });
    updatePreview();

    const addBtnRow = document.createElement('div');
    addBtnRow.style.marginTop = '16px';
    const addBtn = document.createElement('button');
    addBtn.className = 'mk-btn';
    addBtn.textContent = '💾 Simpan Data Pegawai';
    addBtn.onclick = () => {
      addPegawai(currentFormData());
      inNama.value = ''; inTglLahir.value = ''; inBup.value = '58';
      inTmtTerakhir.value = ''; inSkTerakhirThn.value = ''; inSkTerakhirBln.value = '';
      inTmtCpns.value = ''; inSkCpnsThn.value = ''; inSkCpnsBln.value = '';
      updatePreview();
    };
    addBtnRow.appendChild(addBtn);
    sForm.appendChild(addBtnRow);

    const formNote = document.createElement('div');
    formNote.className = 'mk-note';
    formNote.innerHTML = 'Rumus: <b>Masa Kerja Golongan</b> = Masa Kerja pada SK Terakhir + selisih TMT SK Terakhir sampai Tanggal Acuan. <b>Masa Kerja Keseluruhan</b> = Masa Kerja pada SK CPNS + selisih TMT SK CPNS sampai Tanggal Acuan. Kelebihan bulan ≥ 12 otomatis dikonversi jadi tahun.';
    sForm.appendChild(formNote);

    wrap.appendChild(sForm);

    // ===== Hasil Perhitungan (daftar tersimpan) =====
    const sResult = document.createElement('div');
    sResult.className = 'mk-section';
    const resultHead = document.createElement('div');
    resultHead.style.cssText = 'display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;';
    resultHead.innerHTML = `
      <div>
        <div class="mk-section-title">📋 Data Tersimpan</div>
        <div class="mk-section-desc">Dihitung ulang otomatis mengikuti Tanggal Acuan di atas.</div>
      </div>
    `;
    const exportBtn = document.createElement('button');
    exportBtn.className = 'mk-btn-ghost';
    exportBtn.textContent = '📤 Export ke Excel';
    exportBtn.onclick = exportToExcel;
    resultHead.appendChild(exportBtn);
    sResult.appendChild(resultHead);

    if (pegawaiList.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'mk-empty';
      empty.textContent = 'Belum ada data pegawai tersimpan.';
      sResult.appendChild(empty);
    } else {
      const cards = document.createElement('div');
      cards.className = 'mk-cards';
      pegawaiList.forEach(p => {
        const calc = computeForPegawai(p, tanggalAcuan);
        const card = document.createElement('div');
        card.className = 'mk-card';

        const head = document.createElement('div');
        head.className = 'mk-card-head';
        head.innerHTML = `
          <div>
            <div class="mk-card-name">${p.nama || '(tanpa nama)'}</div>
            <div class="mk-card-meta">TMT SK Terakhir: ${fmtDate(parseDate(p.tmtTerakhir))} &middot; TMT SK CPNS: ${fmtDate(parseDate(p.tmtCpns))}${p.tglLahir ? ' &middot; Lahir: ' + fmtDate(parseDate(p.tglLahir)) : ''}</div>
          </div>
        `;
        const delBtn = document.createElement('button');
        delBtn.className = 'mk-btn-danger';
        delBtn.textContent = 'Hapus';
        delBtn.onclick = () => { if (confirm('Hapus data "' + (p.nama || 'pegawai ini') + '"?')) deletePegawai(p.id); };
        head.appendChild(delBtn);
        card.appendChild(head);

        const metrics = document.createElement('div');
        metrics.className = 'mk-metrics';
        const items = [
          ['Masa Kerja Golongan', calc.golongan.tahunHasil + ' thn ' + calc.golongan.bulanHasil + ' bln', ''],
          ['Masa Kerja Keseluruhan', calc.keseluruhan.tahunHasil + ' thn ' + calc.keseluruhan.bulanHasil + ' bln', 'teal'],
          ['KGB Berikutnya (estimasi)', fmtDate(calc.nextKGB), 'teal'],
          ['Kenaikan Pangkat Berikutnya (estimasi)', fmtDate(calc.nextKP), 'teal'],
        ];
        if (p.tglLahir) {
          items.push(['Usia Saat Ini', ymdLabel(calc.usia), '']);
          items.push(['Perkiraan Tanggal Pensiun', fmtDate(calc.pensiunDate), 'gold']);
          items.push(['Sisa Masa Kerja', calc.sisaMasaKerja ? ymdLabel(calc.sisaMasaKerja) : 'Sudah/lewat BUP', calc.sisaMasaKerja ? 'teal' : 'danger']);
        }
        items.forEach(([label, value, cls]) => {
          const m = document.createElement('div');
          m.className = 'mk-metric';
          m.innerHTML = `<div class="mk-metric-label">${label}</div><div class="mk-metric-value ${cls}">${value}</div>`;
          metrics.appendChild(m);
        });
        card.appendChild(metrics);
        cards.appendChild(card);
      });
      sResult.appendChild(cards);
    }

    const note = document.createElement('div');
    note.className = 'mk-note';
    note.innerHTML = `Catatan: KGB (tiap 2 tahun) dan kenaikan pangkat reguler (tiap 4 tahun) dihitung dari acuan TMT SK Terakhir dikurangi Masa Kerja pada SK Terakhir. Perkiraan pensiun mengacu PP No. 11 Tahun 2017 (akhir bulan saat mencapai Batas Usia Pensiun). Semua angka bersifat estimasi — penetapan resmi tetap mengacu SK dan peraturan kepegawaian yang berlaku, dan dapat berbeda untuk jalur non-reguler (kenaikan pangkat pilihan, penyesuaian ijazah, dsb).`;
    sResult.appendChild(note);
    wrap.appendChild(sResult);

    const appFooter = document.createElement('div');
    appFooter.style.cssText = 'text-align:center;font-size:11px;color:var(--text-dim);margin-top:8px;';
    appFooter.innerHTML = 'Built by <a href="https://mahardi.com/" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">Didik Mahardi</a>';
    wrap.appendChild(appFooter);

    root.appendChild(wrap);
  }

  loadData();
})();
</script>
